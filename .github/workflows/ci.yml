name: Finansal Anomali CI

on:
  push:
    branches: [ "main", "feature/data-gen" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Kodları GitHub'dan test sunucusuna çek (Hata buradaydı, düzeltildi)
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Python Ortamını Kur
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Bağımlılıkları Yükle
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f data_generation/requirements.txt ]; then pip install -r data_generation/requirements.txt; fi

    # 4. Kod Yazım Kontrolü
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics